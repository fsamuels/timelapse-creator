# Pi capture config. Points at local disk paths on the headless Pi (not
# `archive/` inside the repo, unlike the GitHub Actions stopgap in config.yaml).
#
# Cams: the two Seattle (KING 5) cams were added first to keep developing the
# pipeline while the off-grid Bluewood cams were down (off-season / generator
# not running). The two Bluewood cams (summit, base) are now captured here too
# — this is the Pi hand-off trial: GitHub Actions (capture/config.yaml) keeps
# capturing Bluewood in parallel for ~1-2 weeks so the two sources can be
# compared before the Actions schedule is disabled — see docs/open-questions.md #1.
# Two North Carolina cams (WLOS-hosted PNG snapshots) were added on top of that
# — Pi-only, no GitHub Actions equivalent.

archive_dir: /var/lib/timelapse/archive
capture_log: /var/lib/timelapse/capture.log
web_output: /var/lib/timelapse/www/index.html  # status page (web/generate.py)

cams:
  columbia:
    site: seattle  # frames land under archive/<site>/<cam>/...
    type: image
    url: "https://cdn.tegna-media.com/king/weather/columbia.jpg"
  queenanne:
    site: seattle
    type: image
    url: "https://cdn.tegna-media.com/king/weather/queenanne.jpg"
  summit:
    site: bluewood
    type: image
    url: "https://cameraftpapi.drivehq.com/api/Camera/LastImageaspx/shareID17403860/bwdsummit.jpg?"
  base:
    site: bluewood
    type: image
    url: "https://cameraftpapi.drivehq.com/api/Camera/LastImageaspx/shareID17403629/bwdbase.jpg?"
  unca-tower:
    site: north-carolina
    type: image
    url: "https://wlos.com/resources/ftptransfer/wlos/maps/Cam%20UNCA%20EcoNet.png"
  nantahala-outdoor-center:
    site: north-carolina
    type: image
    url: "https://wlos.com/resources/ftptransfer/wlos/maps/Cam%20Nantahala%20Outdoor%20Center.png"
