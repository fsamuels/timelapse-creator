# Pi capture config. Points at local disk paths on the headless Pi (not
# `archive/` inside the repo, unlike the GitHub Actions stopgap in config.yaml).
#
# Cams below are Seattle (KING 5) cams, added to keep developing the pipeline
# while the off-grid Bluewood cams are down (off-season / generator not running).
# Bluewood stays on GitHub Actions for now (see capture/config.yaml) and will
# move into this config once the Pi trial begins — see docs/open-questions.md #1.

archive_dir: /var/lib/timelapse/archive
capture_log: /var/lib/timelapse/capture.log
web_output: /var/lib/timelapse/www/index.html  # status page (web/generate.py)

cams:
  columbia:
    site: seattle  # frames land under archive/<site>/<cam>/...
    type: image
    url: "https://cdn.tegna-media.com/king/weather/columbia.jpg"
  queenanne:
    site: seattle
    type: image
    url: "https://cdn.tegna-media.com/king/weather/queenanne.jpg"
