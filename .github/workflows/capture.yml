name: Capture webcam frames

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m capture.main

      - run: |
          git config user.name "capture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add archive
          git diff --cached --quiet || git commit -m "Capture frame $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
